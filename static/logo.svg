<?xml version="1.0" encoding="UTF-8"?>
<!-- OPTION 1: Modern Minimal - Blue Gradient with CV Icon -->
<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blue1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
  </defs>

  <!-- Rounded Square Background -->
  <rect width="40" height="40" rx="10" fill="url(#blue1)"/>

  <!-- CV Letters -->
  <text x="20" y="27" font-family="Arial, sans-serif" font-size="18" font-weight="900" 
        fill="white" text-anchor="middle" letter-spacing="-1">CV</text>
  
  <!-- Checkmark (Success Symbol) -->
  <path d="M28 12L30 14L34 10" stroke="white" stroke-width="2" stroke-linecap="round" 
        stroke-linejoin="round" fill="none" opacity="0.9"/>
</svg>
