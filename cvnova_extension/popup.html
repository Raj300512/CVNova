<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CVNova Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header img {
            width: 24px;
            height: 24px;
            margin-right: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #bb86fc, #b388ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content {
            padding: 20px;
        }

        .status {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            text-align: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #bb86fc;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: #bb86fc;
            border: 1px solid rgba(187, 134, 252, 0.5);
            margin-top: 12px;
        }

        .btn-outline:hover {
            background: rgba(187, 134, 252, 0.1);
        }
        
        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(#bb86fc 0%, rgba(255,255,255,0.1) 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .score-inner {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icons/icon48.png" alt="Logo">
        <h1>CVNova Companion</h1>
    </div>

    <div class="content" id="mainContent">
        <div id="loadingState">
            <div class="status">Waiting for job data...</div>
            <a href="http://127.0.0.1:8080/tracker" target="_blank" class="btn">Open Job Tracker</a>
        </div>
        
        <div id="resultsState" style="display: none;">
            <div class="score-circle" id="scoreCircle">
                <div class="score-inner" id="scoreValue">--%</div>
            </div>
            <div class="status" id="jobTitle">Analyzed Role</div>
            <a href="http://127.0.0.1:8080" target="_blank" class="btn">Deep Analysis in CVNova</a>
            <button id="trackJobBtn" class="btn btn-outline">Track Job</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
