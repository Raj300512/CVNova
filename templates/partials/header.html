<!-- Shared Header Partial — include in all pages -->
<header class="header">
    <a href="/" class="logo" style="text-decoration:none;" title="Back to Home">

            <img src="/static/logo.svg" alt="CVNova Logo" width="40" height="40">
        </div>
        <span class="logo-text">CVNova</span>
    </a>

    <div class="header-user">

        <!-- ── Desktop Nav Links ── -->
        <nav class="header-nav" id="headerNav">
            <a href="/jobs" class="btn-nav header-nav-btn" style="background:rgba(187,134,252,0.1);color:#bb86fc;border-color:rgba(187,134,252,0.3);">

                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>

            </a>
            <a href="/interview" class="btn-nav header-nav-btn" style="background:rgba(239,83,80,0.1);color:#ef5350;border-color:rgba(239,83,80,0.3);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>

                        </a>
                        <a href="/coverletter" class="user-dropdown-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffa726" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>

                        </a>

                            Mock Interview

                        <a href="/salary" class="user-dropdown-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00e676" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>

<style>

    align-items: center;

    align-items: center;

/* ── User Menu ──────────────────────────────────────────────────── */

<script>
// ─── Theme Toggle ─────────────────────────────────────────────────────────
if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
}
function toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
    }
    updateThemeIcons();
}
function updateThemeIcons() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    document.querySelectorAll('.sun-icon').forEach(el => el.style.display = isLight ? 'none' : 'block');
    document.querySelectorAll('.moon-icon').forEach(el => el.style.display = isLight ? 'block' : 'none');
}
document.addEventListener('DOMContentLoaded', updateThemeIcons);

// ─── User Menu Dropdown ───────────────────────────────────────────────────
const userMenuBtn = document.getElementById('userMenuBtn');
const userDropdown = document.getElementById('userDropdown');

userMenuBtn && userMenuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = userDropdown.style.display !== 'none';
    userDropdown.style.display = isOpen ? 'none' : 'block';
    // Close notif dropdown if open
    const nd = document.getElementById('notifDropdown');
    if (nd) nd.style.display = 'none';
});

document.addEventListener('click', (e) => {
    if (userDropdown && !userDropdown.contains(e.target) && e.target !== userMenuBtn) {
        userDropdown.style.display = 'none';
    }
});

// ─── Notifications ────────────────────────────────────────────────────────
const notifBellBtn = document.getElementById('notifBellBtn');
const notifDropdown = document.getElementById('notifDropdown');
const notifBadge = document.getElementById('notifBadge');
const notifList = document.getElementById('notifList');

async function loadNotifications() {
    try {
        const resp = await fetch('/api/notifications');
        if (!resp.ok) return;
        const data = await resp.json();
        const count = data.unread_count || 0;
        if (count > 0) {
            notifBadge.textContent = count > 9 ? '9+' : count;
            notifBadge.style.display = 'flex';
        } else {
            notifBadge.style.display = 'none';
        }
        renderNotifications(data.notifications || []);
    } catch (e) { /* silent */ }
}

function renderNotifications(notifs) {
    if (!notifs.length) {
        notifList.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4);font-size:0.9rem;">No notifications yet</div>';
        return;
    }
    const typeColors = { info: '#bb86fc', success: '#00e676', warning: '#ffa726', reminder: '#03dac5' };
    notifList.innerHTML = notifs.map(n => `
        <div onclick="readNotif(${n.id}, '${n.link || ''}')" style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;background:${n.is_read ? 'transparent' : 'rgba(124,77,255,0.06)'};transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background='${n.is_read ? 'transparent' : 'rgba(124,77,255,0.06)'}'">
            <div style="display:flex;gap:10px;align-items:flex-start;">
                <div style="width:8px;height:8px;border-radius:50%;background:${typeColors[n.type]||'#bb86fc'};margin-top:5px;flex-shrink:0;${n.is_read ? 'opacity:0.3' : ''}"></div>
                <div style="flex:1;min-width:0;">
                    <div style="font-weight:${n.is_read ? '400' : '600'};font-size:0.88rem;color:var(--text-primary,#fff);margin-bottom:2px;">${escapeHtmlNotif(n.title)}</div>
                    <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);line-height:1.4;">${escapeHtmlNotif(n.message)}</div>
                    <div style="font-size:0.75rem;color:rgba(255,255,255,0.3);margin-top:4px;">${timeAgo(n.created_at)}</div>
                </div>
            </div>
        </div>
    `).join('');
}

async function readNotif(id, link) {
    await fetch(`/api/notifications/${id}/read`, { method: 'PUT' });
    if (link) window.location.href = link;
    else loadNotifications();
}

async function markAllRead() {
    await fetch('/api/notifications/read-all', { method: 'PUT' });
    loadNotifications();
}

notifBellBtn && notifBellBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = notifDropdown.style.display !== 'none';
    notifDropdown.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) loadNotifications();
    // Close user dropdown if open
    if (userDropdown) userDropdown.style.display = 'none';
});

document.addEventListener('click', (e) => {
    if (notifDropdown && !notifDropdown.contains(e.target) && e.target !== notifBellBtn) {
        notifDropdown.style.display = 'none';
    }
});

function timeAgo(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
}

function escapeHtmlNotif(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.addEventListener('DOMContentLoaded', loadNotifications);
setInterval(loadNotifications, 60000);
</script>

<!-- ═══ Rate CVNova Modal (available on all pages) ═══ -->

        <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:4px;">Rate CVNova ✨</h2>

                <span class="rate-star" data-val="2" style="font-size:2.2rem;cursor:pointer;color:rgba(255,255,255,0.2);transition:all 0.15s;">★</span>
                <span class="rate-star" data-val="3" style="font-size:2.2rem;cursor:pointer;color:rgba(255,255,255,0.2);transition:all 0.15s;">★</span>
                <span class="rate-star" data-val="4" style="font-size:2.2rem;cursor:pointer;color:rgba(255,255,255,0.2);transition:all 0.15s;">★</span>
                <span class="rate-star" data-val="5" style="font-size:2.2rem;cursor:pointer;color:rgba(255,255,255,0.2);transition:all 0.15s;">★</span>
            </div>
        </div>
        <!-- Job Title -->
        <div style="margin-bottom:14px;">
            <label style="display:block;font-size:0.82rem;color:rgba(255,255,255,0.5);margin-bottom:6px;">Your Role (optional)</label>
            <input type="text" id="rateJobTitle" placeholder="e.g. Software Engineer @ Google"
                style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:0.88rem;outline:none;box-sizing:border-box;"
                onfocus="this.style.borderColor='#7c4dff'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
        </div>
        <!-- Review -->
        <div style="margin-bottom:22px;">
            <label style="display:block;font-size:0.82rem;color:rgba(255,255,255,0.5);margin-bottom:6px;">
                Your Review * <span id="rateCharCount" style="color:rgba(255,255,255,0.25);">(0/500)</span>
            </label>
            <textarea id="rateReview" rows="4" placeholder="How did CVNova help you? What features did you love?"
                style="width:100%;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:0.88rem;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box;"
                onfocus="this.style.borderColor='#7c4dff'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"
                oninput="document.getElementById('rateCharCount').textContent='('+this.value.length+'/500)'"></textarea>
        </div>
        <button onclick="submitRate()" id="rateSubmitBtn"
            style="width:100%;padding:13px;background:linear-gradient(135deg,#7c4dff,#b388ff);color:white;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;">
            🚀 Submit Review
        </button>
        <div id="rateError" style="display:none;margin-top:10px;color:#ff5252;font-size:0.83rem;text-align:center;"></div>
    </div>
</div>

<script>
let _rateVal = 0;

function openRateModal(e) {
    if (e) e.preventDefault();
    // Close user dropdown
    const ud = document.getElementById('userDropdown');
    if (ud) ud.style.display = 'none';
    // Load existing review
    fetch('/api/feedback/mine').then(r => r.json()).then(ex => {
        if (ex && ex.id) {
            _rateVal = ex.rating;
            document.getElementById('rateReview').value = ex.review;
            document.getElementById('rateJobTitle').value = ex.job_title || '';
            document.getElementById('rateCharCount').textContent = `(${ex.review.length}/500)`;
            _updateRateStars(_rateVal);
        }
    }).catch(() => {});
    document.getElementById('rateModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeRateModal() {
    document.getElementById('rateModal').style.display = 'none';
    document.body.style.overflow = '';
    _rateVal = 0;
    document.getElementById('rateReview').value = '';
    document.getElementById('rateJobTitle').value = '';
    document.getElementById('rateError').style.display = 'none';
    document.getElementById('rateCharCount').textContent = '(0/500)';
    _updateRateStars(0);
}

function _updateRateStars(val) {
    document.querySelectorAll('.rate-star').forEach(s => {
        const v = parseInt(s.dataset.val);
        s.style.color = v <= val ? '#ffa726' : 'rgba(255,255,255,0.2)';
        s.style.transform = v <= val ? 'scale(1.15)' : 'scale(1)';
    });
}

document.querySelectorAll('.rate-star').forEach(s => {
    s.addEventListener('click', () => { _rateVal = parseInt(s.dataset.val); _updateRateStars(_rateVal); });
    s.addEventListener('mouseover', () => _updateRateStars(parseInt(s.dataset.val)));
    s.addEventListener('mouseout', () => _updateRateStars(_rateVal));
});

document.getElementById('rateModal').addEventListener('click', e => {
    if (e.target === document.getElementById('rateModal')) closeRateModal();
});

async function submitRate() {
    const review = document.getElementById('rateReview').value.trim();
    const jobTitle = document.getElementById('rateJobTitle').value.trim();
    const errEl = document.getElementById('rateError');
    const btn = document.getElementById('rateSubmitBtn');
    errEl.style.display = 'none';
    if (!_rateVal) { errEl.textContent = '⭐ Please select a star rating!'; errEl.style.display = 'block'; return; }
    if (!review || review.length < 10) { errEl.textContent = 'Review must be at least 10 characters.'; errEl.style.display = 'block'; return; }
    btn.textContent = 'Submitting...'; btn.disabled = true;
    try {
        const resp = await fetch('/api/feedback', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ rating: _rateVal, review, job_title: jobTitle })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Failed');
        closeRateModal();
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e2e;border:1px solid rgba(0,230,118,0.4);color:#00e676;padding:14px 28px;border-radius:12px;font-size:0.9rem;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.4);';
        toast.textContent = '🎉 Thank you! Your review is live on our landing page!';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    } catch(e) {
        errEl.textContent = e.message; errEl.style.display = 'block';
    }
    btn.textContent = '🚀 Submit Review'; btn.disabled = false;
}
</script>
